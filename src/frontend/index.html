<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RJZ Bracket Generator – Free Tournament Bracket Tool for Esports</title>
    <meta name="description" content="Create and manage single elimination tournament brackets for free. Register players, seed your roster, embed live brackets on any site, and run your esports events with ease." />
    <!-- Extract admin token from URL before any library initializes to prevent auth state corruption -->
    <script>
      (function () {
        try {
          var paramName = "caffeineAdminToken";
          var searchParams = new URLSearchParams(window.location.search);
          var token = searchParams.get(paramName);
          if (token !== null) {
            try { sessionStorage.setItem(paramName, token); } catch (e) {}
            searchParams.delete(paramName);
            var newSearch = searchParams.toString();
            var newUrl =
              window.location.pathname +
              (newSearch ? "?" + newSearch : "") +
              window.location.hash;
            window.history.replaceState(null, "", newUrl);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
